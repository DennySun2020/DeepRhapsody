<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0015"/>
      <stop offset="40%" stop-color="#1a0a3e"/>
      <stop offset="100%" stop-color="#060e2e"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#c4b5fd" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="neural" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Orbital rings -->
  <ellipse cx="64" cy="52" rx="44" ry="16" fill="none" stroke="#7c3aed" stroke-width="0.6"
           transform="rotate(-15 64 52)" opacity="0.35"/>
  <ellipse cx="64" cy="52" rx="40" ry="14" fill="none" stroke="#60a5fa" stroke-width="0.5"
           transform="rotate(30 64 52)" opacity="0.25"/>

  <!-- Neural net hints -->
  <g opacity="0.4">
    <line x1="32" y1="48" x2="50" y2="42" stroke="#8b5cf6" stroke-width="0.8"/>
    <line x1="50" y1="42" x2="64" y2="52" stroke="#a78bfa" stroke-width="1"/>
    <line x1="96" y1="48" x2="78" y2="42" stroke="#60a5fa" stroke-width="0.8"/>
    <line x1="78" y1="42" x2="64" y2="52" stroke="#818cf8" stroke-width="1"/>
    <line x1="44" y1="65" x2="64" y2="52" stroke="#a78bfa" stroke-width="0.8"/>
    <line x1="84" y1="65" x2="64" y2="52" stroke="#818cf8" stroke-width="0.8"/>
  </g>
  <g>
    <circle cx="32" cy="48" r="2" fill="#7c3aed" opacity="0.6"/>
    <circle cx="50" cy="42" r="2.5" fill="#a78bfa" opacity="0.8"/>
    <circle cx="96" cy="48" r="2" fill="#3b82f6" opacity="0.6"/>
    <circle cx="78" cy="42" r="2.5" fill="#60a5fa" opacity="0.8"/>
    <circle cx="44" cy="65" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="84" cy="65" r="2" fill="#818cf8" opacity="0.6"/>
  </g>

  <!-- Central orb -->
  <circle cx="64" cy="52" r="28" fill="url(#orb)"/>
  <circle cx="64" cy="52" r="7" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
  <circle cx="64" cy="52" r="4" fill="#ffffff"/>

  <!-- Waveform -->
  <g fill="none" stroke="url(#wave)" stroke-linecap="round">
    <path d="M 24 78 Q 36 65, 48 78 T 72 78 T 96 78 T 108 78" stroke-width="3" opacity="0.85"/>
    <path d="M 28 71 Q 38 62, 50 71 T 74 71 T 96 71 T 106 71" stroke-width="1.5" opacity="0.35"/>
    <path d="M 28 85 Q 38 94, 50 85 T 74 85 T 96 85 T 106 85" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- Musical note (small) -->
  <g transform="translate(86, 30) scale(0.28)" fill="url(#neural)" opacity="0.8">
    <path d="M 0 40 C 0 20, 20 0, 30 0 C 40 0, 45 10, 40 20 C 35 30, 15 35, 10 30
             C 5 25, 10 15, 20 12 L 28 65
             C 28 75, 15 80, 10 75 C 5 70, 8 62, 15 62 C 22 62, 28 68, 28 65 Z"/>
  </g>

  <!-- Sparkles -->
  <circle cx="40" cy="32" r="1" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="64" cy="26" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="88" cy="34" r="1" fill="#c4b5fd" opacity="0.5"/>
</svg>
