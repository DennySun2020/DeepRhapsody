<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="50%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0d1f4a"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Waveform -->
  <g fill="none" stroke="url(#wave)" stroke-linecap="round">
    <path d="M 28 64 Q 42 38, 56 64 T 84 64 T 104 64" stroke-width="4" opacity="0.9"/>
    <path d="M 32 54 Q 44 35, 56 54 T 80 54 T 100 54" stroke-width="2.5" opacity="0.4"/>
    <path d="M 32 74 Q 44 93, 56 74 T 80 74 T 100 74" stroke-width="2.5" opacity="0.4"/>
  </g>

  <!-- Neural dots on wave -->
  <g fill="#c4b5fd" opacity="0.85">
    <circle cx="56" cy="64" r="3"/>
    <circle cx="84" cy="64" r="3"/>
  </g>

  <!-- Musical note (small) -->
  <g transform="translate(84, 34) scale(0.3)" fill="#f0abfc" opacity="0.8">
    <path d="M 0 40 C 0 20, 20 0, 30 0 C 40 0, 45 10, 40 20 C 35 30, 15 35, 10 30
             C 5 25, 10 15, 20 12 L 28 65
             C 28 75, 15 80, 10 75 C 5 70, 8 62, 15 62 C 22 62, 28 68, 28 65 Z"/>
  </g>
</svg>
